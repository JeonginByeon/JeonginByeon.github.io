    <style>
        @import url("https://use.typekit.net/hdr6tgv.css");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "neue-haas-grotesk-text", 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-style: normal;
            font-weight: 500;
            font-size: 11px;
            line-height: 12px;
            color: rgba(0, 0, 0, 0.85);
            background-color: #ffffff;
        }

        * {
            font-family: inherit;
            font-style: inherit;
            font-weight: inherit;
            font-size: inherit;
            line-height: inherit;
        }

        .page {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */

        .left {
            width: 35%;
            height: 100%;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .left-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 12px;
            flex-shrink: 0;
        }

        .bio {
            margin-top: 72px;
            margin-bottom: 90px;
            margin-left: 50%;
            max-width: 50%;
            padding-right: 12px;
        }

        .bio-desc {
            margin-bottom: 12px;
        }

        .bio-inquiries-label {
            margin-bottom: 0px;
        }

        .bio-inquiries-links {
            color: #999;
        }

        .bio-inquiries-links a {
            color: inherit;
            text-decoration: none;
        }

        .bio-inquiries-links a:hover {
            color: rgba(0, 0, 0, 0.85);
        }

        .info-link {
            color: inherit;
            text-decoration: none;
        }

        .info-link:hover {
            text-decoration: underline;
        }

        .project-list {
            flex: 1;
            padding: 0 12px;
            overflow: hidden;
        }

        .project-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .project-table tbody tr {
            cursor: pointer;
        }

        .project-table td {
            padding: 0px 6px 3px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-table td:last-child {
            padding-right: 0;
        }

        .col-num      { width: 6%; }
        .col-name     { width: 44%; }
        .col-category { width: 44%; }
        .col-year     { width: 6%; text-align: left; }

        .row-active td { color: rgba(0, 0, 0, 0.85); }

        .project-table tr:not(.row-active) td { color: #999; }

        .project-table tr:not(.row-active):hover td { color: rgba(0, 0, 0, 0.85); }

        .footer {
            padding: 12px;
            flex-shrink: 0;
        }

        /* ── RIGHT PANEL ── */

        .right {
            width: 65%;
            height: 100%;
            overflow-y: auto;
            padding-right: 12px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .right::-webkit-scrollbar {
            display: none;
        }

        .right-nav {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr 1fr;
            padding: 12px 0;
        }

        .nav-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .project-image {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .image-placeholder {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 0, 0, 0.3);
            margin-bottom: 12px;
        }

        .project-desc {
            padding: 20px 0;
            display: grid;
            grid-template-columns: 1fr 2fr 2fr 1fr;
        }

        .desc-body {
            grid-column: 1 / 3;
            padding-right: 24px;
        }

        .desc-credits {
            grid-column: 3 / 5;
        }

        .desc-credits p {
            margin-bottom: 2px;
        }
        * { cursor: none; }

        #cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
        }

        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9998;
            align-items: center;
            justify-content: center;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .mobile-spacer { display: none; }
        .mobile-info-footer { display: none; }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            * { cursor: auto !important; }
            #cursor { display: none; }

            html, body { overflow: hidden; }

            .page { position: relative; }

            .left {
                width: 100%;
                height: 100vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .bio { display: none; }

            .project-list { overflow-y: visible; padding-top: 24px; }

            .right {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 0;
                background: #fff;
                z-index: 100;
                transform: translateX(100%);
            }

            .right.mobile-visible {
                transform: translateX(0);
            }

            .left-nav {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                background: #fff;
                z-index: 200;
                padding-top: env(safe-area-inset-top);
            }

            .left {
                padding-top: calc(36px + env(safe-area-inset-top));
            }

            .right {
                padding-top: calc(36px + env(safe-area-inset-top));
            }

            .right-nav {
                grid-template-columns: 1fr 2fr 2fr 1fr;
                padding: 24px 12px 12px;
            }

            .project-desc {
                padding: 20px 12px;
                grid-template-columns: 1fr;
            }

            .desc-body {
                grid-column: 1;
                padding-right: 0;
                margin-bottom: 20px;
            }

            .desc-credits {
                grid-column: 1;
            }

            .mobile-back {
                display: block;
                text-align: right;
                cursor: pointer;
            }

            .mobile-br { display: inline; }
            .mobile-block { display: block; }
            .mobile-spacer { display: block; }
            .mobile-info-footer {
                display: block;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: #fff;
                padding: 12px;
                z-index: 201;
            }

            .info-profile,
            .info-section {
                grid-template-columns: 1fr !important;
                padding: 24px 12px !important;
                margin-bottom: 0 !important;
                row-gap: 4px !important;
            }

            .info-profile span:empty,
            .info-section span:empty,
            .info-section div:empty {
                display: none;
            }

            .info-profile > span:first-child,
            .info-section > span:first-child {
                margin-bottom: 8px;
            }

            .info-section > p + span:not(:empty),
            .info-section > div + span:not(:empty) {
                margin-top: 16px;
            }

            .awards-section {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
            }

            .awards-section > span:first-child {
                grid-column: 1 / -1;
                margin-bottom: 8px;
            }

            .awards-section > span:empty {
                display: none;
            }

            .experience-section {
                grid-template-columns: 1fr 1fr !important;
                row-gap: 2px !important;
            }

            .experience-section > span:first-child {
                grid-column: 1 / -1;
                margin-bottom: 8px;
            }

            .experience-section > span:not(:first-child) {
                display: block;
                grid-column: 1 / -1;
                height: 0;
                margin-top: 12px;
            }

            .awards-section > p:nth-child(6) {
                grid-column: 1;
                margin-top: 12px;
            }

            .awards-section > p:nth-child(7) {
                margin-top: 12px;
            }
        }

        .mobile-back { display: none; }
        .mobile-nav { display: none; }
        .mobile-br { display: none; }

        const p = projects[index];

        // 활성 행 업데이트
        document.querySelectorAll('.project-table tr[data-index]').forEach(tr => {
            tr.classList.toggle('row-active', parseInt(tr.dataset.index) === index);
        });

        // 오른쪽 패널 렌더링
        const images = p.images.map(img => {
            if (Array.isArray(img)) {
                const ratio = img[2] || '8/5';
                const renderItem = src => src.match(/\.(mp4|mov|webm)$/i)
                    ? `<video src="${src}" style="width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block;" autoplay muted loop playsinline></video>`
                    : `<img src="${src}" style="width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block;">`;
                return `<div style="aspect-ratio: ${ratio}; display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-bottom: 12px; overflow: hidden;">
                    ${renderItem(img[0])}
                    ${renderItem(img[1])}
                </div>`;
            } else if (typeof img === 'object' && img.src) {
                const isVideo = img.src.match(/\.(mp4|mov|webm)$/i);
                if (img.half) {
                    const inner = isVideo
                        ? `<video src="${img.src}" style="width: 100%; display: block;" autoplay muted loop playsinline></video>`
                        : `<img src="${img.src}" style="width: 100%; display: block;">`;
                    return `<div style="width: 50%; margin: 0 auto 12px; display: block;">${inner}</div>`;
                }
                const inner = isVideo
                    ? `<video src="${img.src}" style="width: 100%; display: block;" autoplay muted loop playsinline></video>`
                    : `<img src="${img.src}" style="width: 100%; display: block;">`;
                return `<a href="${img.link}" target="_blank" style="display: block; margin-bottom: 12px;">${inner}</a>`;
            } else if (img.startsWith('#')) {
                return `<div class="image-placeholder" style="aspect-ratio: 1920 / 1200; background: ${img};">Image placeholder</div>`;
            } else if (img.match(/\.(mp4|mov|webm)$/i)) {
                return `<video src="${img}" style="width: 100%; display: block; margin-bottom: 12px;" autoplay muted loop playsinline></video>`;
            } else {
                return `<img src="${img}" style="width: 100%; display: block; margin-bottom: 12px;">`;
            }
        }).join('');

        const isMobile = window.innerWidth <= 768;
        if (isMobile) {
            document.getElementById('right-panel').classList.add('mobile-visible');
        }

        document.getElementById('right-panel').innerHTML = `
            <div class="right-nav">
                <span>${p.num}</span>
                <div class="nav-meta">
                    <span>${p.name}</span>
                    ${p.subtitle ? `<span>${p.subtitle}</span>` : ''}
                    <span>${p.category}</span>
                </div>
                <div class="nav-meta">
                    <span>${index >= 8 ? 'Personal' : 'Client'}</span>
                    <span>${p.year}</span>
                </div>
                <span></span>
            </div>
            ${images}
            <div class="project-desc">
                <p class="desc-body">${p.description}</p>
                <div class="desc-credits">
                    ${p.credits.map(c => `<p>${c}</p>`).join('')}
                </div>
            </div>
        `;

        document.getElementById('right-panel').scrollTop = 0;


        document.getElementById('right-panel').querySelectorAll('video').forEach(v => {
            v.loop = true;
            v.muted = true;
            v.play().catch(() => {});
        });
    }

    // 커스텀 커서
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    function showInfo() {
        document.querySelectorAll('.project-table tr').forEach(tr => {
            tr.classList.remove('row-active');
        });

        if (window.innerWidth <= 768) {
            document.getElementById('right-panel').classList.add('mobile-visible');
        }

        document.getElementById('right-panel').innerHTML = `
            <div class="right-nav info-profile">
                <span>Profile</span>
                <span style="padding-right: 24px;">Jeongin Byeon (b. 1999, Seoul) is a designer based in London and Seoul, spanning various design practices to realize concepts.</span>
                <span>All work by Jeongin Byeon — including self-initiated, freelance, and <span class="mobile-block">in-company projects.</span></span>
                <span></span>
            </div>

            <div class="info-section experience-section" style="display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; padding: 47.5px 0 60px; margin-bottom: -27.5px; row-gap: 2px; align-items: start;">
                <span>Experience</span>
                <p>Now</p>
                <p>Designer</p>
                <p>Freelance</p>
                <p>Seoul / London</p>

                <span></span>
                <p>2023 — 2026</p>
                <p>Creative Visual Designer</p>
                <p>SM Entertainment</p>
                <p>Seoul, Korea</p>

                <span></span>
                <p>2023</p>
                <p>Brand Designer</p>
                <p>BRENDEN</p>
                <p>Seoul, Korea</p>

                <span></span>
                <p>2021</p>
                <p>Brand Design Intern</p>
                <p>Danggeun Market (Karrot)</p>
                <p>Seoul, Korea</p>

                <span></span>
                <p>2020 — 2021</p>
                <p>Global Marketing Design Intern</p>
                <p>Danggeun Market (Karrot)</p>
                <p>Seoul, Korea</p>

                <span></span>
                <p>2020</p>
                <p>Brand Design Intern</p>
                <p>motemote</p>
                <p>Seoul, Korea</p>
            </div>

            <div class="info-section awards-section" style="display: grid; grid-template-columns: 1fr 2fr 1fr 2fr; padding: 35px 0 60px; row-gap: 2px; align-items: start;">
                <span>Awards</span>
                <p>iF Design Award 2024</p>
                <p>Sockpiens</p>
                <p>Branding & Communication Design</p>

                <span></span>
                <p>Red Dot Design Award 2026</p>
                <p>aespa Dirty Work</p>
                <p>Product Design</p>
            </div>

            <div class="info-section" style="display: grid; grid-template-columns: 1fr 2fr 2fr 1fr; padding: 86px 0 60px;">
                <span>Contact</span>
                <div>
                    <p style="margin-bottom: 2px;"><a href="https://mail.google.com/mail/?view=cm&amp;fs=1&amp;to=jeongin9910@gmail.com" target="_blank" class="info-link">jeongin9910@gmail.com</a></p>
                    <p style="margin-bottom: 2px;"><a href="https://www.instagram.com/ni_gnoej_/" target="_blank" class="info-link">Instagram</a></p>
                    <p style="margin-bottom: 2px;"><a href="https://www.linkedin.com/in/jeongin-byeon" target="_blank" class="info-link">LinkedIn</a></p>
                    <p class="mobile-spacer">&nbsp;</p>
                </div>
                <div>
                    <p style="margin-bottom: 2px;">London, UK</p>
                    <p style="margin-bottom: 2px;">Seoul, Korea</p>
                </div>
                <div></div>
            </div>
            <footer class="mobile-info-footer">
                <p>2026 © Jeongin Byeon. All rights reserved.</p>
            </footer>
        `;

        document.getElementById('right-panel').scrollTop = 0;

    }

    let infoActive = false;
    let lastProjectIndex = 0;
    document.getElementById('info-btn').addEventListener('click', () => {
        if (infoActive) {
            infoActive = false;
            showProject(lastProjectIndex);
        } else {
            infoActive = true;
            showInfo();
        }
    });
    document.getElementById('home-btn').addEventListener('click', () => {
        if (window.innerWidth <= 768) {
            infoActive = false;
            document.getElementById('right-panel').classList.remove('mobile-visible');
        } else {
            showProject(0);
        }
    });

    // 리스트 행 생성
    const tbody = document.getElementById('project-tbody');
    const clientLabel = document.createElement('tr');
    clientLabel.innerHTML = `<td colspan="4" style="padding-bottom: 4px; color: rgba(0,0,0,0.35); cursor: default; pointer-events: none;">Client</td>`;
    tbody.appendChild(clientLabel);
    projects.forEach((p, i) => {
        if (i === 8) {
            const spacer = document.createElement('tr');
            spacer.innerHTML = `<td colspan="4" style="padding-top: 35px; padding-bottom: 4px; color: rgba(0,0,0,0.35); cursor: default; pointer-events: none;">Personal</td>`;
            tbody.appendChild(spacer);
        }
        const tr = document.createElement('tr');
        tr.dataset.index = i;
        tr.innerHTML = `
            <td class="col-num">${p.num}</td>
            <td class="col-name">${p.name}${p.subtitle ? ' ' + p.subtitle : ''}</td>
            <td class="col-category">${p.category}</td>
            <td class="col-year">${p.year}</td>
        `;
        tr.addEventListener('click', () => { infoActive = false; showProject(i); });
        tbody.appendChild(tr);
    });

    // 라이트박스
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    document.getElementById('right-panel').addEventListener('click', e => {
        if (e.target.tagName === 'IMG') {
            lightboxImg.src = e.target.src;
            lightbox.classList.add('active');
        }
    });

    lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
    });

    // 초기 로드
    showProject(0);
    if (window.innerWidth <= 768) {
        document.getElementById('right-panel').classList.remove('mobile-visible');
    }
</script>

</body>
</html>
